name: Release
on:
  release:
    types: [ prereleased, released ]

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: temurin

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to attach assets to the Release
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Builds and signs the ZIP. signPlugin runs automatically when the signing
      # secrets are present; the signed ZIP ends up in build/distributions/.
      - name: Build and sign plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew signPlugin

      # Attach the signed ZIP as a GitHub Release asset (manual install).
      - name: Attach plugin ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true

      # Publish to the Marketplace. publishPlugin reuses the signed artifact.
      - name: Publish plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin
